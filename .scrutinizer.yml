# scrutinizer-ci.com configuration
imports:
  - php
filter:
  excluded_paths:
    - build/
    - tmp/
    - vendor/
    - ci/doctum-config.php
checks:
  php: true
tools:
  external_code_coverage:
    runs: 4 # php 7.x versions * 2
    timeout: 480 # 8 min
build:
  image: default-bionic # Needed to make PHP 7.2 compile
  nodes:
    analysis:
      environment:
        php:
          version: 8.2
          pecl_extensions:
            - dbase
      dependencies:
        before:
          - sudo /home/scrutinizer/.phpenv/shims/php -f /usr/bin/composer.phar self-update --2
          - composer --version
          - composer install
      tests:
        override:
          - php-scrutinizer-run
          - phpcs-run
